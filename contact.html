<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach Out</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav style="margin-bottom: 1.5em">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">My Projects</a></li>
                <li><a href="contact.html">Reach Out</a></li>
            </ul>
        </nav>
    </header>
    <section>
         <div class="flex-container">
            <div class="third-text-container" style="margin-bottom: 1em;">
                <h1>Contact Me<span class="normal-period">.</span></h1>
                <p>Feel free to reach out if you want to talk! I will respond promptly to all received messages and any thoughts, feedback, or questions are appreciated.</p>
            </div>
        </div>
        <div class="flex-container">
            <div class="contact-form">
                <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="645bac26-2fd5-4b41-9b8f-cdb9e0bbeb07">
                    <input type="hidden" name="subject" value="Someone Has Contacted You From Your Website">
                    <input type="checkbox" name="botcheck" id="" style="display: none;">

                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required placeholder="Arnaan">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required placeholder="Shah">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@gmail.com">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required placeholder="Your message here..."></textarea>                    
                    <button type="submit">Send 🚀</button>
               </form>
            </div>
        </div>
        <div class="first-text-container">
                <p>Your data is securely stored and I will not share it publicly.</p>
                <br>
                <div class="learnMore-container">
                    <a href="https://github.com/ArnaanShah" class="project-button">My Github</a>
                </div>
        </div>
    </section>
</body>
</html>
